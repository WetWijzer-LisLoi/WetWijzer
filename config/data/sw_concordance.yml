# Strafniveaus: Art. 36 nieuw Sw. (hoofdstraffen natuurlijke personen)
# De klassieke driedeling misdaad/wanbedrijf/overtreding wordt vervangen
# door 8 niveaus. N1-6 = correctioneel, N7-8 = crimineel.
strafniveaus:
  legal_basis: "Art. 36 nieuw Sw. (Wet 29/02/2024 tot invoering Boek I nieuw Strafwetboek, B.S. 08/04/2024)"
  legal_basis_url: "/laws/2024002052"
  levels:
    - level: 1
      label_nl: "Niveau 1 - Geen gevangenisstraf"
      label_fr: "Niveau 1 - Pas d'emprisonnement"
      gevangenisstraf_nl: "Uitgesloten als hoofdstraf"
      gevangenisstraf_fr: "Exclue comme peine principale"
      beschrijving_nl: "Geldboete, werkstraf, probatiestraf of elektronisch toezicht. Gevangenisstraf kan niet worden opgelegd."
      beschrijving_fr: "Amende, peine de travail, probation ou surveillance électronique. L'emprisonnement ne peut être prononcé."
    - level: 2
      label_nl: "Niveau 2 - 6 maanden tot 3 jaar"
      label_fr: "Niveau 2 - 6 mois à 3 ans"
      gevangenisstraf_nl: "6 maanden – 3 jaar"
      gevangenisstraf_fr: "6 mois – 3 ans"
      beschrijving_nl: "Gevangenisstraf is ultimum remedium: de rechter moet motiveren waarom een alternatieve straf (werkstraf, probatie, elektronisch toezicht) niet volstaat."
      beschrijving_fr: "L'emprisonnement est l'ultimum remedium: le juge doit motiver pourquoi une peine alternative (travail, probation, surveillance électronique) ne suffit pas."
    - level: 3
      label_nl: "Niveau 3 - 3 tot 5 jaar"
      label_fr: "Niveau 3 - 3 à 5 ans"
      gevangenisstraf_nl: "3 – 5 jaar"
      gevangenisstraf_fr: "3 – 5 ans"
      beschrijving_nl: "Correctionele gevangenisstraf. Alternatieve straffen blijven mogelijk."
      beschrijving_fr: "Emprisonnement correctionnel. Les peines alternatives restent possibles."
    - level: 4
      label_nl: "Niveau 4 - 5 tot 10 jaar"
      label_fr: "Niveau 4 - 5 à 10 ans"
      gevangenisstraf_nl: "5 – 10 jaar"
      gevangenisstraf_fr: "5 – 10 ans"
      beschrijving_nl: "Correctionele gevangenisstraf. Behandeling onder vrijheidsberoving mogelijk als alternatief."
      beschrijving_fr: "Emprisonnement correctionnel. Traitement sous privation de liberté possible comme alternative."
    - level: 5
      label_nl: "Niveau 5 - 10 tot 15 jaar"
      label_fr: "Niveau 5 - 10 à 15 ans"
      gevangenisstraf_nl: "10 – 15 jaar"
      gevangenisstraf_fr: "10 – 15 ans"
      beschrijving_nl: "Correctionele gevangenisstraf. Hoogste correctioneel niveau."
      beschrijving_fr: "Emprisonnement correctionnel. Niveau correctionnel le plus élevé."
    - level: 6
      label_nl: "Niveau 6 - 15 tot 20 jaar"
      label_fr: "Niveau 6 - 15 à 20 ans"
      gevangenisstraf_nl: "15 – 20 jaar"
      gevangenisstraf_fr: "15 – 20 ans"
      beschrijving_nl: "Correctionele gevangenisstraf. Grensgebied met criminele straffen."
      beschrijving_fr: "Emprisonnement correctionnel. Zone frontière avec les peines criminelles."
    - level: 7
      label_nl: "Niveau 7 - 20 tot 30 jaar"
      label_fr: "Niveau 7 - 20 à 30 ans"
      gevangenisstraf_nl: "20 – 30 jaar"
      gevangenisstraf_fr: "20 – 30 ans"
      beschrijving_nl: "Criminele straf (opsluiting). Assisenzaken of gecorrectionaliseerd."
      beschrijving_fr: "Peine criminelle (réclusion). Assises ou correctionnalisé."
    - level: 8
      label_nl: "Niveau 8 - Levenslang"
      label_fr: "Niveau 8 - Perpétuité"
      gevangenisstraf_nl: "Levenslange opsluiting"
      gevangenisstraf_fr: "Réclusion à perpétuité"
      beschrijving_nl: "Zwaarste straf. Behandeling onder vrijheidsberoving (18-20 jaar) kan als alternatief."
      beschrijving_fr: "Peine la plus lourde. Traitement sous privation de liberté (18-20 ans) possible comme alternative."

