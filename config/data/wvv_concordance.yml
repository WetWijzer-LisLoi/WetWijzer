# Concordantietabel Wetboek van Vennootschappen (W.Venn.) → Wetboek van Vennootschappen en Verenigingen (WVV)
# Wet 23/03/2019, gewijzigd bij Wet 06/06/2019 - Inwerkingtreding 01/05/2019
# Bron: Belgisch Staatsblad, officiële concordantietabel (bijlage Wet 06/06/2019)
# Format: [oud_art, nieuw_art]
old_numac: "1999A09646"
new_numac: "2019A40586"

label_nl: "W.Venn. → WVV"
label_fr: "C.Soc. → CSA"
source_nl: "Wet 23/03/2019 · In werking 01/05/2019 · Overgang statuten uiterlijk 01/01/2024"
source_fr: "Loi 23/03/2019 · En vigueur 01/05/2019 · Transition statuts au plus tard 01/01/2024"
transition_nl: "Vennootschappen die hun statuten niet vóór 01/01/2024 aanpasten, werden automatisch omgezet (BVBA→BV, CVBA→CV, Comm.VA→NV). Het oude W.Venn. blijft relevant voor interpretatie van pre-WVV contracten en statuten."
transition_fr: "Les sociétés n'ayant pas adapté leurs statuts avant le 01/01/2024 ont été automatiquement converties (SPRL→SRL, SCRL→SC, SCA→SA). L'ancien C.Soc. reste pertinent pour l'interprétation de contrats et statuts antérieurs."

