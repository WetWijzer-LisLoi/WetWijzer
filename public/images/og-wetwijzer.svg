<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent-gradient)"/>
  
  <!-- Scale icon — very subtle watermark -->
  <g transform="translate(850, 120)" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.08">
    <circle cx="100" cy="50" r="24"/>
    <line x1="100" y1="74" x2="100" y2="220"/>
    <line x1="30" y1="110" x2="170" y2="110"/>
    <path d="M 30 110 L 5 180 L 55 180 Z"/>
    <path d="M 170 110 L 145 180 L 195 180 Z"/>
    <line x1="55" y1="220" x2="145" y2="220"/>
  </g>
  
  <!-- Main content — centered vertically -->
  <g transform="translate(80, 140)">
    <!-- App name — large & bright -->
    <text x="0" y="110" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="108" font-weight="800" fill="white" letter-spacing="-2">
      WetWijzer
    </text>
    
    <!-- Tagline — clearly readable -->
    <text x="0" y="185" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="400" fill="#cbd5e1">
      Juridisch informatieportaal voor het Belgisch recht
    </text>
    
    <!-- Categories — accent blue -->
    <text x="0" y="245" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="500" fill="#60a5fa">
      Wetten · Decreten · Besluiten · Rechtspraak
    </text>
  </g>
  
  <!-- Domain pill -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="210" height="44" rx="22" fill="#3b82f6" opacity="0.25"/>
    <text x="105" y="29" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#93c5fd" text-anchor="middle">
      wetwijzer.be
    </text>
  </g>
  
  <!-- Belgian flag -->
  <g transform="translate(1100, 535)">
    <rect x="0" y="0" width="22" height="36" rx="2" fill="#2d2d2d"/>
    <rect x="22" y="0" width="22" height="36" fill="#fcd116"/>
    <rect x="44" y="0" width="22" height="36" rx="2" fill="#ef3340"/>
  </g>
</svg>
